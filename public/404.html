<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      // SPA fallback for GitHub Pages (keeps path for react-router)
      var l = window.location;
      l.replace(l.origin + '/Ofset-M/?p=' + encodeURIComponent(l.pathname + l.search + l.hash));
    </script>
  </head>
  <body></body>
</html>
